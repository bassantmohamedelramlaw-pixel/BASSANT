<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Library</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #2196F3;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h2 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #e8f0fe;
        }
        .btn {
            padding: 6px 12px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
        }
        .edit {
            background-color: #4CAF50;
        }
        .delete {
            background-color: #f44336;
        }
    </style>
</head>
<body>

<header>
    <h1>Manage Users</h1>
</header>

<div class="container">
    <h2>Registered Users</h2>
    <table>
        <tr>
            <th>User ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>

            </td>
        </tr>
        <tr>
            <td>2</td>

            <td>reham@example.com</td>
            <td>User</td>
            <td>
                <a href="#" class="btn edit">Edit</a>
                <a href="#" class="btn delete">Delete</a>
            </td>
        </tr>
        <tr>
            <td>3</td>
            <td>John Smith</td>

            <td>
                <a href="#" class="btn edit">Edit</a>
                <a href="#" class="btn delete">Delete</a>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
