<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommended Books</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e8cae1;
            padding: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .recommended {
            max-width: 400px;
            margin: 20px auto;
            background-color: rgb(244, 229, 245);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .recommended p {
            font-size: 18px;
            margin: 10px 0;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .recommended p:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<h2>Recommended For You</h2>

<div class="recommended">
    <p>Clean Code</p>
    <p>AI Basics</p>
    <p>Machine Learning Guide</p>
</div>

</body>
</html>
