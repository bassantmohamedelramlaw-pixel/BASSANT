<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Books</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ecd4e6;
            padding: 20px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .trending {
            max-width: 400px;
            margin: 20px auto;
            background-color: rgb(238, 225, 237);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .trending p {
            font-size: 18px;
            margin: 10px 0;
            padding: 8px;
            border-bottom: 1px solid #f8d4f1;
        }
        .trending p:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<h2>Trending Books</h2>

<div class="trending">
    <p>1. Atomic Habits</p>
    <p>2. Rich Dad Poor Dad</p>
    <p>3. Deep Work</p>
</div>

</body>
</html>
